<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaltoolvault | JPG to PDF</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --primary: #000000;
            --accent: #ff3e00;
            --muted: #94a3b8;
            --dot-color: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 460px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        /* Branding & Title */
        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 20px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; margin: 0; font-weight: 600; }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title {
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            color: var(--primary);
        }

        /* Dropzone */
        .dropzone {
            border: 1px dashed var(--primary);
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            margin-top: 20px;
        }

        .dropzone:hover { background: #fff; border-style: solid; }
        .dropzone p { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

        #file-input { display: none; }

        /* Preview Area */
        #preview-matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 20px 0;
        }

        .thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border: 1px solid var(--primary);
            filter: grayscale(100%);
        }

        .thumb:hover { filter: grayscale(0%); transform: translateY(-2px); }

        /* Action Button */
        .btn-execute {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            cursor: pointer;
            display: none;
        }

        .btn-execute:hover { background: var(--accent); }

        .progress-bar {
            height: 2px;
            width: 100%;
            background: var(--dot-color);
            margin-top: 15px;
            display: none;
        }

        #progress-fill { height: 100%; background: var(--accent); width: 0%; }

        .footer {
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>Digitaltoolvault</h1>
            <span class="sys-code">ONLINE_OFFLINE</span>
        </div>
        <div class="tool-title">JPG TO PDF CONVERTER</div>
    </div>

    <div class="dropzone" id="drop-area" onclick="document.getElementById('file-input').click()">
        <p id="label-text">Select_Image_Source</p>
        <input type="file" id="file-input" accept="image/jpeg" multiple>
    </div>

    <div id="preview-matrix"></div>

    <button class="btn-execute" id="convert-btn" onclick="generatePDF()">Run_Compilation</button>
    
    <div class="progress-bar" id="prog-wrap">
        <div id="progress-fill"></div>
    </div>

    <div class="footer">
        <span>Secure_Local_Vault</span>
        <span>Version_2.0</span>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const previewMatrix = document.getElementById('preview-matrix');
    const convertBtn = document.getElementById('convert-btn');
    const labelText = document.getElementById('label-text');
    const progWrap = document.getElementById('prog-wrap');
    const progFill = document.getElementById('progress-fill');
    
    let filesList = [];

    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length > 0) {
            filesList = files;
            previewMatrix.innerHTML = '';
            convertBtn.style.display = 'block';
            labelText.innerText = `${files.length}_FILES_READY`;
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'thumb';
                    previewMatrix.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }
    });

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        
        convertBtn.disabled = true;
        convertBtn.innerText = "COMPILING...";
        progWrap.style.display = 'block';

        for (let i = 0; i < filesList.length; i++) {
            const progress = ((i + 1) / filesList.length) * 100;
            progFill.style.width = `${progress}%`;

            const imgData = await readFile(filesList[i]);
            if (i > 0) pdf.addPage();

            const imgProps = pdf.getImageProperties(imgData);
            const pWidth = pdf.internal.pageSize.getWidth();
            const pHeight = (imgProps.height * pWidth) / imgProps.width;

            pdf.addImage(imgData, 'JPEG', 0, 0, pWidth, pHeight);
        }

        pdf.save("Digitaltoolvault_Export.pdf");
        
        convertBtn.disabled = false;
        convertBtn.innerText = "RUN_COMPILATION";
        labelText.innerText = "EXPORT_COMPLETE";
        setTimeout(() => { progWrap.style.display = 'none'; }, 2000);
    }

    function readFile(file) {
        return new Promise((res) => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    // Drag and Drop
    const area = document.getElementById('drop-area');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
        area.addEventListener(ev, (e) => { e.preventDefault(); e.stopPropagation(); });
    });
    area.addEventListener('drop', (e) => {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
    });
</script>

</body>
</html>
