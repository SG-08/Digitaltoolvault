<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Image Compressor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed #e2e8f0;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 25px;
            background: #fafafa;
        }

        .upload-zone:hover { border-color: var(--accent); background: #fffcfb; }

        /* Controls */
        .control-group { margin-bottom: 25px; }
        label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 12px; letter-spacing: 1px; }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--primary); display: block; }
        .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--muted); text-transform: uppercase; }

        /* Preview area */
        #preview-container {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        img { max-width: 100%; max-height: 200px; border: 1px solid var(--primary); }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        button:hover { background: var(--accent); }
        button:disabled { background: var(--muted); cursor: not-allowed; }

        .sys-footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: var(--muted);
            margin-top: 25px;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">IMG_OPT_CLIENT_V1</span>
        </div>
        <div class="tool-title">Image Compressor</div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div id="upload-prompt" style="font-family: 'JetBrains Mono'; font-size: 11px; color: var(--primary);">SELECT_IMAGE_OR_DROP_FILE</div>
        <div style="font-size: 8px; color: var(--muted); margin-top: 5px;">SUPPORTED: JPG, PNG, WEBP</div>
    </div>

    <div id="preview-container">
        <img id="imagePreview" alt="Preview">
    </div>

    <div class="control-group">
        <label>Compression_Quality: <span id="qualityLabel" style="color: var(--accent);">80%</span></label>
        <input type="range" id="qualityRange" min="5" max="100" value="80">
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-val" id="origSize">0 KB</span>
            <span class="stat-label">Original_Size</span>
        </div>
        <div class="stat-box">
            <span class="stat-val" id="compSize">0 KB</span>
            <span class="stat-label">Estimated_Compressed</span>
        </div>
    </div>

    <button id="downloadBtn" disabled onclick="downloadImage()">Download_Optimized_Asset</button>

    <div class="sys-footer">PROCESSING: BROWSER_SIDE | SECURITY: ZERO_UPLOAD_PROTOCOL</div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const qualityRange = document.getElementById('qualityRange');
    const qualityLabel = document.getElementById('qualityLabel');
    const origSizeDisp = document.getElementById('origSize');
    const compSizeDisp = document.getElementById('compSize');
    const downloadBtn = document.getElementById('downloadBtn');
    const imagePreview = document.getElementById('imagePreview');
    const previewContainer = document.getElementById('preview-container');

    let originalFile = null;
    let compressedBlob = null;

    fileInput.addEventListener('change', handleUpload);
    qualityRange.addEventListener('input', () => {
        qualityLabel.innerText = qualityRange.value + '%';
        if (originalFile) compressImage();
    });

    function handleUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        originalFile = file;
        origSizeDisp.innerText = formatSize(file.size);
        
        const reader = new FileReader();
        reader.onload = (event) => {
            imagePreview.src = event.target.result;
            previewContainer.style.display = 'block';
            compressImage();
        };
        reader.readAsDataURL(file);
    }

    function compressImage() {
        const img = new Image();
        img.src = imagePreview.src;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const quality = qualityRange.value / 100;
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            
            // Calculate approximate size
            const head = 'data:image/jpeg;base64,';
            const size = Math.round((dataUrl.length - head.length) * 3 / 4);
            
            compSizeDisp.innerText = formatSize(size);
            compSizeDisp.style.color = size < originalFile.size ? 'var(--accent)' : 'inherit';
            
            compressedBlob = dataURLToBlob(dataUrl);
            downloadBtn.disabled = false;
        };
    }

    function dataURLToBlob(dataurl) {
        let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){ u8arr[n] = bstr.charCodeAt(n); }
        return new Blob([u8arr], {type:mime});
    }

    function formatSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function downloadImage() {
        if (!compressedBlob) return;
        const url = URL.createObjectURL(compressedBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'DTV_Optimized_' + originalFile.name;
        link.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
