<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitaltoolvault | EMI_Engine</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --line: #000000;
    --muted: #94a3b8;
    --error: #ff3e3e;
    --success: #10b981;
}

* { box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(#f1f5f9 1px, transparent 1px);
    background-size: 24px 24px;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.calculator {
    width: 100%;
    max-width: 440px;
    border: 2px solid var(--line);
    padding: 40px;
    background: white;
    position: relative;
    box-shadow: 20px 20px 0px #f1f5f9;
}

.header {
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 2px solid var(--line);
    margin-bottom: 30px;
    padding-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 500; }
.status-dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 8px; }

.input-grid { display: grid; gap: 20px; margin-bottom: 25px; }

label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
}

input {
    width: 100%;
    border: 1px solid #e2e8f0;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    background: transparent;
}

.results {
    margin-top: 10px;
    text-align: center;
    padding: 30px;
    background: #fafafa;
    border: 1px solid #eee;
    cursor: pointer;
}

.res-code { font-size: 9px; color: var(--muted); margin-bottom: 10px; }

#output { font-size: 40px; margin: 0; }

.breakdown {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
    font-size: 10px;
}

.history { margin-top: 30px; font-size: 11px; }

.history-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
}

.tooltip { font-size: 9px; margin-top: 12px; }

/* SEO */
.seo {
    max-width: 800px;
    margin-top: 60px;
    line-height: 1.6;
}
</style>

</head>

<body>

<!-- CALCULATOR (UNCHANGED UI) -->

<div class="calculator">
    <div class="header">
        <h1><span class="status-dot"></span>Digitaltoolvault</h1>
        <div style="font-size: 10px;">EMI_PRCSN_ENGINE</div>
    </div>

```
<div class="input-grid">
    <div>
        <label>Principal_Loan_Amount</label>
        <input type="number" id="principal">
    </div>

    <div>
        <label>Annual_Interest_Rate [%]</label>
        <input type="number" id="rate">
    </div>

    <div>
        <label>Tenure_Duration [Months]</label>
        <input type="number" id="tenure">
    </div>
</div>

<div class="results" onclick="copyResult()">
    <div class="res-code">Monthly_Installment:</div>
    <p id="output">0.00</p>
</div>

<div class="history">
    <div>SESSION_HISTORY:</div>
</div>
```

</div>

<!-- SEO CONTENT -->

<div class="seo">
<h1>EMI Calculator Online – Calculate Monthly Loan Installments Instantly</h1>
<p>This EMI calculator helps you calculate your monthly loan EMI instantly with accurate results.</p>
</div>

<script>
function calculateEMI(){
 const P=+principal.value,R=(+rate.value/12)/100,N=+tenure.value;
 if(P&&R&&N){
  const emi=P*R*Math.pow(1+R,N)/(Math.pow(1+R,N)-1);
  output.innerText=emi.toFixed(2);
 }
}
principal.oninput=rate.oninput=tenure.oninput=calculateEMI;

function copyResult(){
 navigator.clipboard.writeText(output.innerText);
}
</script>

</body>
</html>
