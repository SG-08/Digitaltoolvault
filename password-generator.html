<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Password Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
            --success: #10b981;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

        /* Output Display */
        .display-area {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            cursor: pointer;
            word-break: break-all;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .display-area:hover { border-color: var(--primary); background: white; }

        #password-out {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            color: var(--primary);
        }

        /* Controls */
        .control-group { margin-bottom: 20px; }
        
        label { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 9px; 
            text-transform: uppercase; 
            color: var(--muted); 
            display: flex; 
            justify-content: space-between;
            margin-bottom: 10px; 
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--primary);
            text-transform: uppercase;
            cursor: pointer;
        }

        .option-item input { accent-color: var(--primary); cursor: pointer; }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        button:hover { background: var(--accent); }

        .sys-footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: var(--muted);
            margin-top: 25px;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">ENTROPY_GEN_V1</span>
        </div>
        <div class="tool-title">Password Generator</div>
    </div>

    <div class="display-area" id="copyBtn" title="Click to Copy">
        <span id="password-out">P@ssw0rd_123</span>
    </div>

    <div class="control-group">
        <label>Entropy_Length: <span id="lengthVal" style="color: var(--accent);">16</span></label>
        <input type="range" id="lengthRange" min="8" max="50" value="16">
    </div>

    <div class="options-grid">
        <label class="option-item"><input type="checkbox" id="upper" checked> Uppercase</label>
        <label class="option-item"><input type="checkbox" id="lower" checked> Lowercase</label>
        <label class="option-item"><input type="checkbox" id="numbers" checked> Numbers</label>
        <label class="option-item"><input type="checkbox" id="symbols" checked> Symbols</label>
    </div>

    <button onclick="generate()">Generate_Secure_Key</button>

    <div class="sys-footer">PROTOCOL: CRYPTO_JS_WEBAPI | STORAGE: VOLATILE_ONLY</div>
</div>

<script>
    const lengthRange = document.getElementById('lengthRange');
    const lengthVal = document.getElementById('lengthVal');
    const passwordOut = document.getElementById('password-out');
    const copyBtn = document.getElementById('copyBtn');

    const charSets = {
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lower: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
    };

    lengthRange.addEventListener('input', () => {
        lengthVal.innerText = lengthRange.value;
    });

    function generate() {
        let allowedChars = '';
        if (document.getElementById('upper').checked) allowedChars += charSets.upper;
        if (document.getElementById('lower').checked) allowedChars += charSets.lower;
        if (document.getElementById('numbers').checked) allowedChars += charSets.numbers;
        if (document.getElementById('symbols').checked) allowedChars += charSets.symbols;

        if (allowedChars === '') {
            passwordOut.innerText = "SELECT_OPTIONS";
            return;
        }

        let password = '';
        const length = parseInt(lengthRange.value);
        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);

        for (let i = 0; i < length; i++) {
            password += allowedChars.charAt(array[i] % allowedChars.length);
        }

        passwordOut.innerText = password;
        passwordOut.style.color = 'var(--primary)';
    }

    copyBtn.addEventListener('click', () => {
        const pass = passwordOut.innerText;
        if (pass && pass !== "SELECT_OPTIONS" && pass !== "COPIED_TO_BUFFER") {
            navigator.clipboard.writeText(pass);
            passwordOut.innerText = "COPIED_TO_BUFFER";
            passwordOut.style.color = "var(--success)";
            setTimeout(() => {
                passwordOut.innerText = pass;
                passwordOut.style.color = "var(--primary)";
            }, 800);
        }
    });

    // Initial Generation
    generate();
</script>

</body>
</html>
