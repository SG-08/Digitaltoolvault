<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaltoolvault | EMI_Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --line: #000000;
            --muted: #94a3b8;
            --error: #ff3e3e;
            --success: #10b981;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#f1f5f9 1px, transparent 1px);
            background-size: 24px 24px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator {
            width: 100%;
            max-width: 440px;
            border: 2px solid var(--line);
            padding: 40px;
            background: white;
            position: relative;
            box-shadow: 20px 20px 0px #f1f5f9;
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--line);
            margin-bottom: 30px;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 500; }
        .status-dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 8px; }

        .input-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }

        .input-wrap { position: relative; }

        label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            border: 1px solid #e2e8f0;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            outline: none;
            transition: all 0.2s;
            border-radius: 0;
            background: transparent;
        }

        input:focus { border-color: var(--line); background: #fcfcfc; }
        input.invalid { border-color: var(--error); background: #fff5f5; }

        .results {
            margin-top: 10px;
            text-align: center;
            padding: 30px;
            background: #fafafa;
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }

        .results:hover { background: #fdfdfd; border-color: var(--line); }
        .results:active { transform: scale(0.98); }

        .res-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #output {
            font-family: 'JetBrains Mono', monospace;
            font-size: 40px;
            font-weight: 500;
            margin: 0;
            letter-spacing: -2px;
            color: var(--line);
        }

        .breakdown {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .history {
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .tooltip { font-size: 9px; margin-top: 12px; color: var(--muted); opacity: 0.6; font-family: 'JetBrains Mono', monospace; }

        @media (max-width: 480px) {
            .calculator { padding: 30px 20px; }
            #output { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="header">
        <h1><span class="status-dot"></span>Digitaltoolvault</h1>
        <div style="font-family: 'JetBrains Mono'; font-size: 10px; color: var(--muted);">EMI_PRCSN_ENGINE</div>
    </div>
    
    <div class="input-grid">
        <div class="input-wrap">
            <label>Principal_Loan_Amount</label>
            <input type="number" id="principal" placeholder="00.00" autocomplete="off">
        </div>

        <div class="input-wrap">
            <label>Annual_Interest_Rate [%]</label>
            <input type="number" id="rate" placeholder="0.0" step="0.1" autocomplete="off">
        </div>

        <div class="input-wrap">
            <label>Tenure_Duration [Months]</label>
            <input type="number" id="tenure" placeholder="00" autocomplete="off">
        </div>
    </div>

    <div class="results" onclick="copyResult()">
        <div class="res-code" id="res-header">Monthly_Installment:</div>
        <p id="output">0.00</p>
        <div class="breakdown">
            <span>Total_Interest: <b id="total-interest">0</b></span>
            <span>Total_Payment: <b id="total-amt">0</b></span>
        </div>
        <div class="tooltip">EXECUTE_CLICK_TO_COPY_EMI</div>
    </div>

    <div class="history" id="history-log">
        <div style="margin-bottom: 12px; color: black; font-weight: 600; letter-spacing: 1px;">SESSION_HISTORY:</div>
    </div>
</div>

<script>
    const pInput = document.getElementById('principal');
    const rInput = document.getElementById('rate');
    const tInput = document.getElementById('tenure');
    const output = document.getElementById('output');
    const interestOutput = document.getElementById('total-interest');
    const totalAmtOutput = document.getElementById('total-amt');
    const resHeader = document.getElementById('res-header');
    const historyLog = document.getElementById('history-log');

    window.onload = () => pInput.focus();

    [pInput, rInput, tInput].forEach(el => {
        el.addEventListener('input', calculateEMI);
    });

    function calculateEMI() {
        const P = parseFloat(pInput.value);
        const annualRate = parseFloat(rInput.value);
        const N = parseFloat(tInput.value);

        pInput.classList.remove('invalid');
        rInput.classList.remove('invalid');
        tInput.classList.remove('invalid');
        output.style.color = "black";

        if (pInput.value && rInput.value && tInput.value) {
            if (annualRate <= 0 || N <= 0) {
                renderError("VAL_ERR_NONZERO");
                return;
            }

            // Monthly Interest Rate
            const R = (annualRate / 12) / 100;
            
            // EMI Formula: [P x R x (1+R)^N]/[(1+R)^N-1]
            const emi = P * R * Math.pow(1 + R, N) / (Math.pow(1 + R, N) - 1);
            
            if (isNaN(emi) || !isFinite(emi)) {
                renderError("CALC_OVERFLOW");
                return;
            }

            const totalPayment = emi * N;
            const totalInterest = totalPayment - P;

            output.innerText = emi.toLocaleString(undefined, {maximumFractionDigits: 2});
            interestOutput.innerText = Math.round(totalInterest).toLocaleString();
            totalAmtOutput.innerText = Math.round(totalPayment).toLocaleString();

            clearTimeout(window.saveTimeout);
            window.saveTimeout = setTimeout(() => addToHistory(P, emi), 2000);
        } else {
            resetDisplay();
        }
    }

    function renderError(msg) {
        output.innerText = msg;
        output.style.color = "var(--error)";
        output.style.fontSize = "24px";
    }

    function resetDisplay() {
        output.innerText = "0.00";
        output.style.fontSize = "40px";
        interestOutput.innerText = "0";
        totalAmtOutput.innerText = "0";
    }

    function copyResult() {
        if (output.innerText !== "0.00" && !output.innerText.includes('ERR')) {
            navigator.clipboard.writeText(output.innerText);
            const original = resHeader.innerText;
            resHeader.innerText = "SUCCESS_COPIED";
            resHeader.style.color = "var(--success)";
            setTimeout(() => {
                resHeader.innerText = original;
                resHeader.style.color = "var(--muted)";
            }, 1200);
        }
    }

    function addToHistory(p, emi) {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span>AMT: ${p.toLocaleString()}</span> <span>EMI: ${Math.round(emi).toLocaleString()}</span>`;
        if (historyLog.children.length > 4) historyLog.removeChild(historyLog.lastChild);
        historyLog.insertBefore(item, historyLog.children[1]);
    }
</script>

</body>
</html>
