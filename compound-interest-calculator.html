<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Compound Interest</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { font-size: 16px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }
        label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; letter-spacing: 1px; }

        input, select {
            width: 100%;
            border: 2px solid #e2e8f0;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            outline: none;
            border-radius: 0;
            background: #fff;
            color: var(--primary);
        }

        input:focus, select:focus { border-color: var(--primary); background: #fafafa; }

        .results-box {
            margin-top: 10px;
            text-align: center;
            padding: 30px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }

        .results-box:hover { border-color: var(--primary); background: #ffffff; }

        .res-code { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }

        #output-main { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 500; margin: 0; color: var(--primary); letter-spacing: -1px; }

        .breakdown {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .breakdown b { color: var(--primary); }
        .breakdown b.interest { color: var(--accent); }

        .tooltip { font-size: 8px; margin-top: 12px; color: var(--muted); opacity: 0.8; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }

        @media (max-width: 480px) { .vault-card { padding: 30px 20px; } #output-main { font-size: 28px; } }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">CMPND_PRCSN_V1</span>
        </div>
        <div class="tool-title">Compound Interest</div>
    </div>

    <div class="input-grid">
        <div>
            <label>Initial_Principal</label>
            <input type="number" id="principal" placeholder="10000" autocomplete="off">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Annual_Rate [%]</label>
                <input type="number" id="rate" placeholder="5" step="0.1" autocomplete="off">
            </div>
            <div>
                <label>Time_Horizon [Y]</label>
                <input type="number" id="years" placeholder="10" autocomplete="off">
            </div>
        </div>

        <div>
            <label>Compounding_Frequency</label>
            <select id="frequency">
                <option value="1">Annually (1/Yr)</option>
                <option value="2">Semi-Annually (2/Yr)</option>
                <option value="4">Quarterly (4/Yr)</option>
                <option value="12" selected>Monthly (12/Yr)</option>
                <option value="365">Daily (365/Yr)</option>
            </select>
        </div>
    </div>

    <div class="results-box" id="copyArea">
        <div class="res-code" id="status-label">Future_Value_Projection:</div>
        <p id="output-main">0.00</p>
        <div class="breakdown">
            <span>Invested: <b id="total-principal">0</b></span>
            <span>Interest_Gain: <b id="total-interest" class="interest">0</b></span>
        </div>
        <div class="tooltip">Click_Result_To_Copy</div>
    </div>
</div>

<script>
    const pIn = document.getElementById('principal');
    const rIn = document.getElementById('rate');
    const yIn = document.getElementById('years');
    const fIn = document.getElementById('frequency');
    
    const outMain = document.getElementById('output-main');
    const outP = document.getElementById('total-principal');
    const outI = document.getElementById('total-interest');
    const statusLabel = document.getElementById('status-label');

    [pIn, rIn, yIn, fIn].forEach(el => el.addEventListener('input', calculate));

    function calculate() {
        const P = parseFloat(pIn.value);
        const r = parseFloat(rIn.value) / 100;
        const t = parseFloat(yIn.value);
        const n = parseFloat(fIn.value);

        if (!isNaN(P) && !isNaN(r) && !isNaN(t)) {
            // Formula: A = P(1 + r/n)^(nt)
            const amount = P * Math.pow((1 + (r / n)), (n * t));
            const interest = amount - P;

            outMain.innerText = amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            outP.innerText = P.toLocaleString();
            outI.innerText = interest.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        } else {
            outMain.innerText = "0.00";
            outP.innerText = "0";
            outI.innerText = "0";
        }
    }

    document.getElementById('copyArea').addEventListener('click', () => {
        if (outMain.innerText !== "0.00") {
            navigator.clipboard.writeText(outMain.innerText).then(() => {
                const original = statusLabel.innerText;
                statusLabel.innerText = "DATA_SYNC_COPIED";
                statusLabel.style.color = "#ff5722";
                setTimeout(() => {
                    statusLabel.innerText = original;
                    statusLabel.style.color = "#94a3b8";
                }, 1000);
            });
        }
    });
</script>

</body>
</html>
