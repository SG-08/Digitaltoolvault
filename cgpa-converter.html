<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Dual Academic Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

        .converter-grid { display: flex; flex-direction: column; gap: 25px; }

        .input-wrap { position: relative; }

        label { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 9px; 
            text-transform: uppercase; 
            color: var(--muted); 
            display: block; 
            margin-bottom: 8px; 
            letter-spacing: 1px; 
        }

        input {
            width: 100%;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            outline: none;
            border-radius: 0;
            background: #fff;
            color: var(--primary);
            text-align: center;
        }

        input:focus { border-color: var(--primary); background: #fafafa; }
        
        .sync-icon {
            text-align: center;
            color: var(--accent);
            font-size: 20px;
            margin: -10px 0;
            user-select: none;
        }

        .formula-card {
            margin-top: 30px;
            padding: 15px;
            background: #f8fafc;
            border-left: 3px solid var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: var(--muted);
            margin-top: 25px;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">ACAD_SYNC_V2.0</span>
        </div>
        <div class="tool-title">Dual Grade Engine</div>
    </div>

    <div class="converter-grid">
        <div class="input-wrap">
            <label>Academic_CGPA [10.0 Scale]</label>
            <input type="number" id="cgpa" placeholder="0.00" step="0.01" min="0" max="10">
        </div>

        <div class="sync-icon">⇅</div>

        <div class="input-wrap">
            <label>Percentage [%]</label>
            <input type="number" id="percent" placeholder="0.0" step="0.1" min="0" max="100">
        </div>
    </div>

    <div class="formula-card">
        Algorithm: Percentage = CGPA × 9.5<br>
        Reverse: CGPA = Percentage / 9.5
    </div>

    <div class="footer">BI-DIRECTIONAL_SYNC_ACTIVE</div>
</div>

<script>
    const cgpaInput = document.getElementById('cgpa');
    const percentInput = document.getElementById('percent');

    // Convert CGPA to Percentage
    cgpaInput.addEventListener('input', () => {
        const val = parseFloat(cgpaInput.value);
        if (!isNaN(val)) {
            if (val > 10) {
                percentInput.value = "";
                cgpaInput.style.borderColor = "var(--accent)";
            } else {
                cgpaInput.style.borderColor = "var(--primary)";
                percentInput.value = (val * 9.5).toFixed(2);
            }
        } else {
            percentInput.value = "";
        }
    });

    // Convert Percentage to CGPA
    percentInput.addEventListener('input', () => {
        const val = parseFloat(percentInput.value);
        if (!isNaN(val)) {
            if (val > 100) {
                cgpaInput.value = "";
                percentInput.style.borderColor = "var(--accent)";
            } else {
                percentInput.style.borderColor = "var(--primary)";
                cgpaInput.value = (val / 9.5).toFixed(2);
            }
        } else {
            cgpaInput.value = "";
        }
    });

    // Precision Formatter on Blur
    [cgpaInput, percentInput].forEach(el => {
        el.addEventListener('blur', (e) => {
            const val = parseFloat(e.target.value);
            if (!isNaN(val)) {
                e.target.value = val.toFixed(2);
            }
        });
    });
</script>

</body>
</html>
