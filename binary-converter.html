    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
            --error: #ef4444;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-line h1 { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 0; 
            font-weight: 800; 
            color: var(--primary); 
        }

        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { 
            font-size: 18px; 
            font-weight: 600; 
            text-transform: uppercase; 
            margin-top: 10px; 
            color: var(--primary); 
        }

        .converter-grid { display: flex; flex-direction: column; gap: 25px; }

        label { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 9px; 
            text-transform: uppercase; 
            color: var(--muted); 
            margin-bottom: 8px; 
            display: block;
        }

        input {
            width: 100%;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            outline: none;
            background: #fff;
            color: var(--primary);
        }

        input.invalid { border-color: var(--error); color: var(--error); }

        .sync-icon {
            text-align: center;
            color: var(--accent);
            font-size: 20px;
        }

<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">BINARY_V1</span>
        </div>
        <div class="tool-title">Binary Converter</div>
    </div>

    <div class="converter-grid">
        <div>
            <label>Binary Input</label>
            <input type="text" id="binary">
        </div>

        <div class="sync-icon">⇅</div>

        <div>
            <label>Decimal Output</label>
            <input type="text" id="decimal">
        </div>
    </div>
</div>

<script>
const binary = document.getElementById("binary");
const decimal = document.getElementById("decimal");

binary.addEventListener("input", () => {
    const val = binary.value;
    if (/^[01]+$/.test(val)) {
        decimal.value = parseInt(val, 2);
        binary.classList.remove("invalid");
    } else {
        binary.classList.add("invalid");
    }
});

decimal.addEventListener("input", () => {
    const val = decimal.value;
    if (!isNaN(val) && val !== "") {
        binary.value = parseInt(val).toString(2);
        decimal.classList.remove("invalid");
    } else {
        decimal.classList.add("invalid");
    }
});
</script>

</body>
