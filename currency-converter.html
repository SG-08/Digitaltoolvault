<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Hybrid Currency Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
            --success: #10b981;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { font-size: 16px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

        .input-stack { display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px; }
        label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; letter-spacing: 1px; }

        input {
            width: 100%;
            border: 2px solid #e2e8f0;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            outline: none;
            border-radius: 0;
            background: #fff;
        }

        .search-container { position: relative; }
        .search-input { background: #fafafa; border-bottom: 2px solid var(--primary); padding-right: 35px; }
        
        /* Dropdown arrow icon */
        .search-container::after {
            content: '▼';
            position: absolute;
            right: 12px;
            top: 35px;
            font-size: 10px;
            color: var(--muted);
            pointer-events: none;
        }

        .options-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 250px;
            overflow-y: auto;
            background: white;
            border: 2px solid var(--primary);
            border-top: none;
            z-index: 100;
            display: none;
        }

        .options-list div {
            padding: 10px 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }

        .options-list div:hover { background: var(--accent); color: white; }

        .currency-grid { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; align-items: start; }
        .swap-btn { height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 20px; margin-top: 15px; }
        .swap-btn:hover { color: var(--accent); transform: rotate(180deg); }

        button.execute {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }
        button.execute:hover { background: var(--accent); }

        .results-box {
            margin-top: 25px;
            text-align: center;
            padding: 30px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        #output-main { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 500; margin: 0; color: var(--primary); }
        #rate-info { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 10px; text-transform: uppercase; }

        @media (max-width: 480px) { .vault-card { padding: 30px 20px; } }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">HYBRID_DROPDOWN_V6</span>
        </div>
        <div class="tool-title">Global Currency Converter</div>
    </div>

    <div class="input-stack">
        <div>
            <label>Transaction_Amount</label>
            <input type="number" id="amount" value="100">
        </div>

        <div class="currency-grid">
            <div class="search-container">
                <label>Source_Country</label>
                <input type="text" id="fromSearch" class="search-input" placeholder="Select/Search..." autocomplete="off">
                <div id="fromList" class="options-list"></div>
            </div>

            <div class="swap-btn" onclick="swap()">⇄</div>

            <div class="search-container">
                <label>Target_Country</label>
                <input type="text" id="toSearch" class="search-input" placeholder="Select/Search..." autocomplete="off">
                <div id="toList" class="options-list"></div>
            </div>
        </div>
    </div>

    <button class="execute" onclick="runConversion()">Execute_Exchange</button>

    <div class="results-box">
        <div id="rate-info">Awaiting_Data_Input...</div>
        <p id="output-main">--</p>
    </div>
</div>

<script>
    const countryData = [
        { c: "Afghanistan", cr: "AFN" }, { c: "Albania", cr: "ALL" }, { c: "Algeria", cr: "DZD" }, { c: "Angola", cr: "AOA" }, { c: "Argentina", cr: "ARS" }, { c: "Armenia", cr: "AMD" }, { c: "Aruba", cr: "AWG" }, { c: "Australia", cr: "AUD" }, { c: "Azerbaijan", cr: "AZN" }, { c: "Bahamas", cr: "BSD" }, { c: "Bahrain", cr: "BHD" }, { c: "Bangladesh", cr: "BDT" }, { c: "Barbados", cr: "BBD" }, { c: "Belarus", cr: "BYN" }, { c: "Belize", cr: "BZD" }, { c: "Bermuda", cr: "BMD" }, { c: "Bhutan", cr: "BTN" }, { c: "Bolivia", cr: "BOB" }, { c: "Bosnia and Herz.", cr: "BAM" }, { c: "Botswana", cr: "BWP" }, { c: "Brazil", cr: "BRL" }, { c: "Brunei", cr: "BND" }, { c: "Bulgaria", cr: "BGN" }, { c: "Burundi", cr: "BIF" }, { c: "Cambodia", cr: "KHR" }, { c: "Canada", cr: "CAD" }, { c: "Cape Verde", cr: "CVE" }, { c: "Cayman Islands", cr: "KYD" }, { c: "Chile", cr: "CLP" }, { c: "China", cr: "CNY" }, { c: "Colombia", cr: "COP" }, { c: "Comoros", cr: "KMF" }, { c: "Costa Rica", cr: "CRC" }, { c: "Croatia", cr: "EUR" }, { c: "Cuba", cr: "CUP" }, { c: "Czech Republic", cr: "CZK" }, { c: "Denmark", cr: "DKK" }, { c: "Djibouti", cr: "DJF" }, { c: "Dominican Rep.", cr: "DOP" }, { c: "Egypt", cr: "EGP" }, { c: "Eritrea", cr: "ERN" }, { c: "Ethiopia", cr: "ETB" }, { c: "European Union", cr: "EUR" }, { c: "Fiji", cr: "FJD" }, { c: "Gambia", cr: "GMD" }, { c: "Georgia", cr: "GEL" }, { c: "Ghana", cr: "GHS" }, { c: "Guatemala", cr: "GTQ" }, { c: "Guinea", cr: "GNF" }, { c: "Guyana", cr: "GYD" }, { c: "Haiti", cr: "HTG" }, { c: "Honduras", cr: "HNL" }, { c: "Hong Kong", cr: "HKD" }, { c: "Hungary", cr: "HUF" }, { c: "Iceland", cr: "ISK" }, { c: "India", cr: "INR" }, { c: "Indonesia", cr: "IDR" }, { c: "Iran", cr: "IRR" }, { c: "Iraq", cr: "IQD" }, { c: "Israel", cr: "ILS" }, { c: "Jamaica", cr: "JMD" }, { c: "Japan", cr: "JPY" }, { c: "Jordan", cr: "JOD" }, { c: "Kazakhstan", cr: "KZT" }, { c: "Kenya", cr: "KES" }, { c: "Kuwait", cr: "KWD" }, { c: "Kyrgyzstan", cr: "KGS" }, { c: "Laos", cr: "LAK" }, { c: "Lebanon", cr: "LBP" }, { c: "Lesotho", cr: "LSL" }, { c: "Liberia", cr: "LRD" }, { c: "Libya", cr: "LYD" }, { c: "Macau", cr: "MOP" }, { c: "Macedonia", cr: "MKD" }, { c: "Madagascar", cr: "MGA" }, { c: "Malawi", cr: "MWK" }, { c: "Malaysia", cr: "MYR" }, { c: "Maldives", cr: "MVR" }, { c: "Mauritania", cr: "MRU" }, { c: "Mauritius", cr: "MUR" }, { c: "Mexico", cr: "MXN" }, { c: "Moldova", cr: "MDL" }, { c: "Mongolia", cr: "MNT" }, { c: "Morocco", cr: "MAD" }, { c: "Mozambique", cr: "MZN" }, { c: "Myanmar", cr: "MMK" }, { c: "Namibia", cr: "NAD" }, { c: "Nepal", cr: "NPR" }, { c: "New Zealand", cr: "NZD" }, { c: "Nicaragua", cr: "NIO" }, { c: "Nigeria", cr: "NGN" }, { c: "North Korea", cr: "KPW" }, { c: "Norway", cr: "NOK" }, { c: "Oman", cr: "OMR" }, { c: "Pakistan", cr: "PKR" }, { c: "Panama", cr: "PAB" }, { c: "Papua New Guinea", cr: "PGK" }, { c: "Paraguay", cr: "PYG" }, { c: "Peru", cr: "PEN" }, { c: "Philippines", cr: "PHP" }, { c: "Poland", cr: "PLN" }, { c: "Qatar", cr: "QAR" }, { c: "Romania", cr: "RON" }, { c: "Russia", cr: "RUB" }, { c: "Rwanda", cr: "RWF" }, { c: "Samoa", cr: "WST" }, { c: "Saudi Arabia", cr: "SAR" }, { c: "Serbia", cr: "RSD" }, { c: "Seychelles", cr: "SCR" }, { c: "Sierra Leone", cr: "SLL" }, { c: "Singapore", cr: "SGD" }, { c: "Solomon Islands", cr: "SBD" }, { c: "Somalia", cr: "SOS" }, { c: "South Africa", cr: "ZAR" }, { c: "South Korea", cr: "KRW" }, { c: "South Sudan", cr: "SSP" }, { c: "Sri Lanka", cr: "LKR" }, { c: "Sudan", cr: "SDG" }, { c: "Suriname", cr: "SRD" }, { c: "Swaziland", cr: "SZL" }, { c: "Sweden", cr: "SEK" }, { c: "Switzerland", cr: "CHF" }, { c: "Syria", cr: "SYP" }, { c: "Taiwan", cr: "TWD" }, { c: "Tajikistan", cr: "TJS" }, { c: "Tanzania", cr: "TZS" }, { c: "Thailand", cr: "THB" }, { c: "Tonga", cr: "TOP" }, { c: "Trinidad and Tob.", cr: "TTD" }, { c: "Tunisia", cr: "TND" }, { c: "Turkey", cr: "TRY" }, { c: "Turkmenistan", cr: "TMT" }, { c: "Uganda", cr: "UGX" }, { c: "Ukraine", cr: "UAH" }, { c: "United Arab Em.", cr: "AED" }, { c: "United Kingdom", cr: "GBP" }, { c: "United States", cr: "USD" }, { c: "Uruguay", cr: "UYU" }, { c: "Uzbekistan", cr: "UZS" }, { c: "Vanuatu", cr: "VUV" }, { c: "Venezuela", cr: "VES" }, { c: "Vietnam", cr: "VND" }, { c: "Yemen", cr: "YER" }, { c: "Zambia", cr: "ZMW" }, { c: "Zimbabwe", cr: "ZWL" }
    ];

    let selectedFrom = "USD";
    let selectedTo = "INR";

    function setupSearch(inputId, listId, isFrom) {
        const input = document.getElementById(inputId);
        const list = document.getElementById(listId);

        // Hybrid behavior: click to show all (dropdown), type to filter
        input.addEventListener('click', (e) => {
            renderList('', list, inputId, isFrom);
            list.style.display = 'block';
        });
        
        input.addEventListener('input', (e) => {
            renderList(e.target.value, list, inputId, isFrom);
            list.style.display = 'block';
        });
    }

    function renderList(filter, listEl, inputId, isFrom) {
        const val = filter.toLowerCase();
        listEl.innerHTML = '';
        
        const matches = countryData.filter(item => 
            item.c.toLowerCase().includes(val) || item.cr.toLowerCase().includes(val)
        );

        if (matches.length > 0) {
            matches.forEach(match => {
                const div = document.createElement('div');
                div.innerHTML = `${match.c} (${match.cr})`;
                div.onclick = () => {
                    const input = document.getElementById(inputId);
                    input.value = `${match.c} (${match.cr})`;
                    if (isFrom) selectedFrom = match.cr; else selectedTo = match.cr;
                    listEl.style.display = 'none';
                };
                listEl.appendChild(div);
            });
        } else {
            const noRes = document.createElement('div');
            noRes.style.color = 'var(--muted)';
            noRes.innerText = 'No results found';
            listEl.appendChild(noRes);
        }
    }

    async function runConversion() {
        const amt = document.getElementById('amount').value;
        const info = document.getElementById('rate-info');
        const out = document.getElementById('output-main');

        if (!amt || amt <= 0) {
            info.innerText = "INVALID_AMOUNT";
            return;
        }

        info.innerText = "Synchronizing_Global_Exchange...";
        try {
            const res = await fetch(`https://open.er-api.com/v6/latest/${selectedFrom}`);
            const data = await res.json();
            const rate = data.rates[selectedTo];
            const result = (amt * rate).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            out.innerText = `${result} ${selectedTo}`;
            info.innerHTML = `1 ${selectedFrom} = ${rate.toFixed(4)} ${selectedTo}`;
        } catch (e) {
            out.innerText = "SYNC_ERROR";
        }
    }

    function swap() {
        const fIn = document.getElementById('fromSearch');
        const tIn = document.getElementById('toSearch');
        [fIn.value, tIn.value] = [tIn.value, fIn.value];
        [selectedFrom, selectedTo] = [selectedTo, selectedFrom];
        runConversion();
    }

    setupSearch('fromSearch', 'fromList', true);
    setupSearch('toSearch', 'toList', false);
    
    // Default values
    document.getElementById('fromSearch').value = "United States (USD)";
    document.getElementById('toSearch').value = "India (INR)";

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            document.querySelectorAll('.options-list').forEach(l => l.style.display = 'none');
        }
    });
</script>

</body>
</html>
