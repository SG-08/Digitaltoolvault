<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Hybrid Currency Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --primary: #37474f; 
    --accent: #ff5722;  
    --muted: #94a3b8;
    --dot-color: #d1d5db;
    --glass: rgba(255, 255, 255, 0.9);
}

* { box-sizing: border-box; transition: all 0.2s ease; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
    background-size: 30px 30px;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.vault-card {
    width: 100%;
    max-width: 500px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 2px solid var(--primary);
    padding: 40px;
    box-shadow: 15px 15px 0px var(--primary);
}

.header {
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 2px solid var(--primary);
    margin-bottom: 30px;
    padding-bottom: 15px;
}

.brand-line {
    display: flex;
    justify-content: space-between;
}

.brand-line h1 { font-size: 12px; text-transform: uppercase; margin: 0; }
.brand-line h1 span { color: var(--accent); }

.tool-title { font-size: 16px; font-weight: 600; margin-top: 10px; }

.input-stack { display: flex; flex-direction: column; gap: 20px; }

label { font-size: 10px; color: var(--muted); }

input {
    width: 100%;
    border: 2px solid #e2e8f0;
    padding: 12px;
    font-size: 15px;
}

.search-container { position: relative; }

.options-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 200px;
    overflow-y: auto;
    background: white;
    border: 2px solid var(--primary);
    display: none;
}

.options-list div {
    padding: 10px;
    cursor: pointer;
}

.options-list div:hover { background: var(--accent); color: white; }

.currency-grid { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; }

.swap-btn { cursor: pointer; text-align: center; font-size: 20px; }

button {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    cursor: pointer;
}

.results-box {
    margin-top: 20px;
    text-align: center;
}
</style>
</head>

<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
        </div>
        <div class="tool-title">Global Currency Converter</div>
    </div>

    <div class="input-stack">
        <input type="number" id="amount" value="100">

        <div class="currency-grid">
            <div class="search-container">
                <input type="text" id="fromSearch" placeholder="From">
                <div id="fromList" class="options-list"></div>
            </div>

            <div class="swap-btn" onclick="swap()">⇄</div>

            <div class="search-container">
                <input type="text" id="toSearch" placeholder="To">
                <div id="toList" class="options-list"></div>
            </div>
        </div>

        <button onclick="runConversion()">Convert</button>

        <div class="results-box">
            <div id="rate-info"></div>
            <h2 id="output-main">--</h2>
        </div>
    </div>
</div>

<script>
// 🌍 AUTO LOAD ALL COUNTRIES
let currencyData = [];
let from = "USD";
let to = "INR";

document.getElementById("fromSearch").value = "USD";
document.getElementById("toSearch").value = "INR";

async function loadCurrencies() {
    const res = await fetch("https://restcountries.com/v3.1/all");
    const data = await res.json();

    data.forEach(c => {
        if (c.currencies) {
            const code = Object.keys(c.currencies)[0];
            currencyData.push({
                code: code,
                country: c.name.common
            });
        }
    });
}

loadCurrencies();

// SEARCH
function setupSearch(inputId, listId) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);

    input.addEventListener("input", () => {
        const query = input.value.toLowerCase();

        const filtered = currencyData.filter(item =>
            item.code.toLowerCase().includes(query) ||
            item.country.toLowerCase().includes(query)
        );

        list.innerHTML = "";
        list.style.display = "block";

        filtered.forEach(item => {
            const div = document.createElement("div");
            div.innerText = `${item.code} - ${item.country}`;

            div.onclick = () => {
                input.value = `${item.code} - ${item.country}`;
                list.style.display = "none";

                if (inputId === "fromSearch") from = item.code;
                else to = item.code;
            };

            list.appendChild(div);
        });
    });

    document.addEventListener("click", (e) => {
        if (!list.contains(e.target) && e.target !== input) {
            list.style.display = "none";
        }
    });
}

setupSearch("fromSearch", "fromList");
setupSearch("toSearch", "toList");

// SWAP
function swap() {
    [from, to] = [to, from];

    document.getElementById("fromSearch").value = from;
    document.getElementById("toSearch").value = to;
}

// CONVERT
async function runConversion() {
    const amount = document.getElementById("amount").value;

    const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
    const data = await res.json();

    const rate = data.rates[to];
    const result = amount * rate;

    document.getElementById("output-main").innerText = result.toFixed(2);
    document.getElementById("rate-info").innerText = `1 ${from} = ${rate} ${to}`;
}
</script>

</body>
</html>
