<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigitalToolVault | Image Watermark</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --primary: #37474f; 
    --accent: #ff5722;  
    --muted: #94a3b8;
    --dot-color: #d1d5db;
    --glass: rgba(255, 255, 255, 0.9);
}

* { box-sizing: border-box; transition: all 0.2s ease; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
    background-size: 30px 30px;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.vault-card {
    width: 100%;
    max-width: 600px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 2px solid var(--primary);
    padding: 40px;
    position: relative;
    box-shadow: 15px 15px 0px var(--primary);
}

.header {
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 2px solid var(--primary);
    margin-bottom: 25px;
    padding-bottom: 15px;
}

.brand-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
.brand-line h1 span { color: var(--accent); }
.sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

.tool-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

.preview-stage {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    padding: 10px;
    margin-bottom: 25px;
    min-height: 200px;
    display: flex;
    justify-content: center;
    align-items: center;
}

canvas { max-width: 100%; display: none; }

label { font-size: 9px; color: var(--muted); margin-bottom: 6px; display: block; }

input {
    width: 100%;
    border: 2px solid #e2e8f0;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    padding: 18px;
    cursor: pointer;
}

.sys-footer {
    font-size: 8px;
    color: var(--muted);
    margin-top: 25px;
    text-align: center;
}

.seo {
    max-width: 800px;
    margin-top: 60px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">IMG_WM_SYNTH_V1</span>
        </div>
        <div class="tool-title">Image Watermark Generator</div>
    </div>

    <div class="preview-stage">
        <div id="placeholder">AWAITING_IMAGE_BUFFER</div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <input type="file" id="imageLoader">
    <input type="text" id="wmText" placeholder="ENTER TEXT">

    <!-- ✅ NEW CONTROLS -->
    <label>Font Size</label>
    <input type="range" id="fontSize" min="10" max="100" value="40">

    <label>Watermark Color</label>
    <input type="color" id="wmColor" value="#ffffff">

    <button id="downloadBtn">Download</button>

    <div class="sys-footer">PROCESSING: BROWSER_CANVAS_API</div>
</div>

<!-- SEO SAME -->
<div class="seo">
<h1>Image Watermark Tool Online – Add Watermark to Images Instantly</h1>
<p>Use this free image watermark tool to add text watermark to your images instantly.</p>
</div>

<script>
const imageLoader = document.getElementById('imageLoader');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const textInput = document.getElementById('wmText');
const placeholder = document.getElementById('placeholder');
const downloadBtn = document.getElementById('downloadBtn');
const fontSize = document.getElementById('fontSize');
const wmColor = document.getElementById('wmColor');

let img = new Image();

imageLoader.addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(event){
        img.onload = function(){
            canvas.width = img.width;
            canvas.height = img.height;

            canvas.style.display = "block";
            placeholder.style.display = "none";

            drawWatermark();
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

textInput.addEventListener('input', drawWatermark);
fontSize.addEventListener('input', drawWatermark);
wmColor.addEventListener('input', drawWatermark);

function drawWatermark(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    const text = textInput.value;
    const size = fontSize.value;
    const color = wmColor.value;

    if(text){
        ctx.font = size + "px Arial";
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.6;
        ctx.textAlign = "right";

        ctx.fillText(text, canvas.width - 20, canvas.height - 20);
    }
}

downloadBtn.addEventListener("click", function(){
    const link = document.createElement("a");
    link.download = "watermarked.png";
    link.href = canvas.toDataURL();
    link.click();
});
</script>

</body>
</html>
