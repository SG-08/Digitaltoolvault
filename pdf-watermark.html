<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Custom Text PDF Watermark</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

        .upload-zone {
            border: 2px dashed #e2e8f0;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .control-group { margin-bottom: 15px; }
        label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; letter-spacing: 1px; }

        input[type="text"] {
            width: 100%;
            border: 2px solid #e2e8f0;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .color-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #e2e8f0;
            padding: 6px 12px;
            background: white;
        }

        input[type="color"] { border: none; width: 30px; height: 30px; cursor: pointer; background: none; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover { background: var(--accent); }
        button:disabled { background: var(--muted); cursor: not-allowed; }

        .status-log {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">PDF_CUSTOM_WM_V3</span>
        </div>
        <div class="tool-title">Watermark Engine</div>
    </div>

    <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div id="file-label" style="font-family: 'JetBrains Mono'; font-size: 11px; color: var(--primary);">UPLOAD_SOURCE_PDF</div>
    </div>

    <div class="control-group">
        <label>Watermark_Text_Buffer</label>
        <input type="text" id="wm-text" placeholder="ENTER CUSTOM TEXT..." value="DIGITAL TOOL VAULT">
    </div>

    <div class="input-grid">
        <div class="control-group">
            <label>Matrix_Color</label>
            <div class="color-wrap">
                <input type="color" id="wm-color" value="#ff5722">
                <span style="font-size: 9px; font-family: 'JetBrains Mono'; color: var(--muted);">HEX</span>
            </div>
        </div>
        <div class="control-group">
            <label>Rotation [°]</label>
            <input type="range" id="wm-rotation" min="0" max="360" value="45">
        </div>
    </div>

    <div class="control-group">
        <label>Layer_Opacity [%]</label>
        <input type="range" id="wm-opacity" min="5" max="100" value="30">
    </div>

    <button id="processBtn" disabled onclick="addWatermark()">Execute_Synthesis</button>

    <div id="status" class="status-log">AWAITING_PDF_INPUT</div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const label = document.getElementById('file-label');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    let pdfBuffer = null;

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            pdfBuffer = await file.arrayBuffer();
            label.innerText = file.name.toUpperCase();
            processBtn.disabled = false;
            status.innerText = "BUFFER_LOAD_SUCCESS";
        }
    });

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16) / 255;
        const g = parseInt(hex.slice(3, 5), 16) / 255;
        const b = parseInt(hex.slice(5, 7), 16) / 255;
        return { r, g, b };
    }

    async function addWatermark() {
        if (!pdfBuffer) return;

        processBtn.disabled = true;
        status.innerText = "SYNTHESIZING_LAYERS...";

        try {
            const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;
            const pdfDoc = await PDFDocument.load(pdfBuffer);
            const helveticaFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
            const pages = pdfDoc.getPages();

            const customText = document.getElementById('wm-text').value.trim() || "DTV_SECURE";
            const opacity = document.getElementById('wm-opacity').value / 100;
            const rotation = parseInt(document.getElementById('wm-rotation').value);
            const colorHex = document.getElementById('wm-color').value;
            const colors = hexToRgb(colorHex);

            pages.forEach((page) => {
                const { width, height } = page.getSize();
                // Dynamic sizing based on string length to prevent overflow
                const fontSize = customText.length > 20 ? 30 : 50;

                page.drawText(customText, {
                    x: width / 6,
                    y: height / 2.5,
                    size: fontSize,
                    font: helveticaFont,
                    color: rgb(colors.r, colors.g, colors.b),
                    rotate: degrees(rotation),
                    opacity: opacity,
                });
            });

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `DTV_Watermarked_${customText.replace(/\s+/g, '_')}.pdf`;
            link.click();

            status.innerText = "SYNTHESIS_COMPLETE_DOWNLOADED";
            processBtn.disabled = false;
        } catch (err) {
            console.error(err);
            status.innerText = "CRITICAL_SYNTHESIS_ERROR";
            processBtn.disabled = false;
        }
    }
</script>

</body>
</html>
