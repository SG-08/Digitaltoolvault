<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaltoolvault | Inflation Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #000000;
            --accent: #ff3e00;
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; margin: 0; font-weight: 600; }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title {
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            color: var(--primary);
        }

        .input-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }

        label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            border: 2px solid #e2e8f0;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            outline: none;
            border-radius: 0;
            background: #fff;
        }

        input:focus { border-color: var(--primary); background: #fafafa; }
        input.invalid { border-color: var(--accent); background: #fff5f5; }

        .results {
            margin-top: 10px;
            text-align: center;
            padding: 30px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }

        .results:hover { border-color: var(--primary); background: #ffffff; }

        .res-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #output {
            font-family: 'JetBrains Mono', monospace;
            font-size: 38px;
            font-weight: 500;
            margin: 0;
            letter-spacing: -1px;
            color: var(--primary);
        }

        .comparison {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .history {
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .history-header {
            color: black;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .tooltip { font-size: 9px; margin-top: 12px; color: var(--muted); opacity: 0.8; font-family: 'JetBrains Mono', monospace; }

        @media (max-width: 480px) {
            .vault-card { padding: 30px 20px; }
            #output { font-size: 30px; }
        }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>Digitaltoolvault</h1>
            <span class="sys-code">INFL_PRCSN_V1</span>
        </div>
        <div class="tool-title">Inflation Calculator</div>
    </div>

    <div class="input-grid">
        <div class="input-wrap">
            <label>Starting_Amount [Current_Value]</label>
            <input type="number" id="amount" placeholder="1000" autocomplete="off">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-wrap">
                <label>Period [Years]</label>
                <input type="number" id="years" placeholder="10" autocomplete="off">
            </div>
            <div class="input-wrap">
                <label>Avg_Rate [%]</label>
                <input type="number" id="rate" placeholder="3.0" step="0.1" autocomplete="off">
            </div>
        </div>
    </div>

    <div class="results" id="copyArea">
        <div class="res-code" id="status-label">Future_Value_Projection:</div>
        <p id="output">0.00</p>
        <div class="comparison">
            <span>Purchasing_Power_Loss: <b id="loss" style="color: var(--accent)">0%</b></span>
        </div>
        <div class="tooltip">CLICK_RESULT_TO_COPY</div>
    </div>

    <div class="history" id="history-log">
        <div class="history-header">Session_History:</div>
    </div>
</div>

<script>
    const amtIn = document.getElementById('amount');
    const yrsIn = document.getElementById('years');
    const rteIn = document.getElementById('rate');
    const out = document.getElementById('output');
    const lossOut = document.getElementById('loss');
    const statusLabel = document.getElementById('status-label');
    const historyLog = document.getElementById('history-log');
    const copyArea = document.getElementById('copyArea');

    window.onload = () => amtIn.focus();

    [amtIn, yrsIn, rteIn].forEach(input => {
        input.addEventListener('input', calculateInflation);
    });

    function calculateInflation() {
        const P = parseFloat(amtIn.value);
        const t = parseFloat(yrsIn.value);
        const r = parseFloat(rteIn.value) / 100;

        amtIn.classList.remove('invalid');
        yrsIn.classList.remove('invalid');
        rteIn.classList.remove('invalid');

        if (!isNaN(P) && !isNaN(t) && !isNaN(r)) {
            if (t < 0) {
                renderError("TIME_ERR");
                return;
            }

            // Formula: FV = P * (1 + r)^t
            const futureValue = P * Math.pow((1 + r), t);
            
            // Formula for purchasing power: PP = P / (1 + r)^t
            // Loss = (P - PP) / P
            const purchasingPower = P / Math.pow((1 + r), t);
            const percentageLoss = ((P - purchasingPower) / P) * 100;

            out.innerText = futureValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            lossOut.innerText = percentageLoss.toFixed(1) + "%";
            out.style.color = "var(--primary)";

            clearTimeout(window.logTimeout);
            window.logTimeout = setTimeout(() => {
                addToHistory(P, t, out.innerText);
            }, 1500);
        } else {
            out.innerText = "0.00";
            lossOut.innerText = "0%";
        }
    }

    function renderError(msg) {
        out.innerText = msg;
        out.style.color = "var(--accent)";
    }

    function addToHistory(p, t, res) {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span>${p.toLocaleString()} over ${t}y</span> <span style="color:black">${res}</span>`;
        if (historyLog.children.length > 5) historyLog.removeChild(historyLog.lastChild);
        historyLog.insertBefore(item, historyLog.children[1]);
    }

    copyArea.addEventListener('click', () => {
        const text = out.innerText;
        if (text !== "0.00" && !text.includes('ERR')) {
            navigator.clipboard.writeText(text).then(() => {
                const original = statusLabel.innerText;
                statusLabel.innerText = "COPIED_TO_CLIPBOARD";
                statusLabel.style.color = "var(--success)";
                setTimeout(() => {
                    statusLabel.innerText = original;
                    statusLabel.style.color = "var(--muted)";
                }, 1000);
            });
        }
    });
</script>

</body>
</html>
