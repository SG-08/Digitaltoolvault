<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator – DigitalToolVault</title>
<meta name="description" content="Free online scientific calculator with advanced functions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>body{font-family:Inter,sans-serif;background:#fff;padding:40px}h1{font-family:'JetBrains Mono';color:#37474f} .box{max-width:700px;margin:auto;border:2px solid #37474f;padding:30px;box-shadow:10px 10px 0 #37474f} button{padding:10px;margin:4px}</style>
</head>
<body>
<div class="box">
<h1>Scientific Calculator</h1>
<p>Advanced scientific calculator by DigitalToolVault.</p>
<input id="display" style="width:100%;padding:14px;font-size:20px;margin-bottom:20px" readonly>
<div>
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button><br>
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button><br>
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">−</button><br>
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="append('+')">+</button><br>
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.sqrt(')">√</button>
<button onclick="clearDisplay()">C</button>
</div>
<h2>About This Tool</h2>
<p>This free scientific calculator helps solve advanced mathematical equations instantly with support for trigonometry, logarithms, powers and roots.</p>
</div>
<script>
function append(v){document.getElementById('display').value+=v}
function clearDisplay(){document.getElementById('display').value=''}
function calculate(){try{document.getElementById('display').value=eval(document.getElementById('display').value)}catch(e){alert('Invalid Expression')}}
</script>
</body>
</html>
