<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalToolVault | Word Counter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #37474f; 
            --accent: #ff5722;  
            --muted: #94a3b8;
            --dot-color: #d1d5db;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vault-card {
            width: 100%;
            max-width: 650px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .header {
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .brand-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-line h1 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 800; color: var(--primary); }
        .brand-line h1 span { color: var(--accent); }
        .sys-code { font-size: 9px; color: var(--accent); font-weight: bold; }

        .tool-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-top: 10px; color: var(--primary); }

        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #e2e8f0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            outline: none;
            resize: vertical;
            background: #fff;
            color: var(--primary);
            margin-bottom: 20px;
        }

        textarea:focus { border-color: var(--primary); background: #fafafa; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 600;
            display: block;
            color: var(--primary);
        }

        .stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 5px;
        }

        .reading-meter {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: var(--primary);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
        }

        .reading-meter span { color: var(--accent); font-weight: bold; }

        button {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover { background: #f1f5f9; border-color: var(--accent); color: var(--accent); }

        .sys-footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: var(--muted);
            margin-top: 25px;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="vault-card">
    <div class="header">
        <div class="brand-line">
            <h1>DigitalTool<span>Vault</span></h1>
            <span class="sys-code">LEX_ANALYTICS_V1</span>
        </div>
        <div class="tool-title">Word Counter Engine</div>
    </div>

    <textarea id="textInput" placeholder="Enter_Text_For_Analysis..."></textarea>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-val" id="wordCount">0</span>
            <span class="stat-label">Words</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="charCount">0</span>
            <span class="stat-label">Chars</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="sentenceCount">0</span>
            <span class="stat-label">Sentences</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="charNoSpace">0</span>
            <span class="stat-label">No_Spaces</span>
        </div>
    </div>

    <div class="reading-meter">
        Estimated_Reading_Time: <span id="readTime">0m 0s</span>
    </div>

    <button onclick="clearBuffer()">Clear_Text_Buffer</button>

    <div class="sys-footer">PROCESSING: REALTIME_SYNC | STORAGE: NON_PERSISTENT</div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');
    const sentenceCount = document.getElementById('sentenceCount');
    const charNoSpace = document.getElementById('charNoSpace');
    const readTime = document.getElementById('readTime');

    textInput.addEventListener('input', () => {
        const text = textInput.value;
        
        // Word Count
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        wordCount.innerText = words;

        // Character Counts
        charCount.innerText = text.length;
        charNoSpace.innerText = text.replace(/\s/g, '').length;

        // Sentence Count
        const sentences = text.split(/[.!?]+/).filter(Boolean).length;
        sentenceCount.innerText = sentences;

        // Reading Time (Average 200 words per minute)
        const totalSeconds = Math.floor((words / 200) * 60);
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        readTime.innerText = `${m}m ${s}s`;
    });

    function clearBuffer() {
        textInput.value = '';
        textInput.dispatchEvent(new Event('input'));
        textInput.focus();
    }
</script>

</body>
</html>
